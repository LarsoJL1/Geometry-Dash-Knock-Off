<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geometry Dash Clone</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0b1321;
        color: #d9e3f0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .game-shell {
        width: min(900px, 100%);
        background: radial-gradient(circle at top, #1d2d44 0%, #09111f 60%, #020813 100%);
        border: 2px solid #3d5a80;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      }

      .hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 18px 20px;
        background: rgba(7, 17, 30, 0.72);
        border-bottom: 1px solid rgba(68, 123, 195, 0.2);
      }

      .hud .title {
        font-size: 1.1rem;
        letter-spacing: 0.08em;
      }

      .hud .score {
        display: flex;
        gap: 12px;
        font-size: 1rem;
      }

      .hud button {
        border: none;
        background: #3d5a80;
        color: #f3f4f6;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      .hud button:hover {
        transform: translateY(-1px);
        background: #5b7db5;
      }

      .mode-buttons {
        display: flex;
        gap: 8px;
      }

      .mode-buttons button {
        font-size: 0.9rem;
        padding: 8px 14px;
      }

      .mode-buttons button.active {
        background: #7fa3d1;
        font-weight: 600;
      }

      .canvas-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        color: #f4f9ff;
        text-align: center;
        padding: 20px;
        backdrop-filter: blur(8px);
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .overlay.visible {
        pointer-events: auto;
        opacity: 1;
      }

      .overlay h2 {
        font-size: clamp(1.8rem, 2.4vw, 3rem);
        margin-bottom: 14px;
      }

      .overlay p {
        max-width: 520px;
        line-height: 1.6;
        margin-bottom: 20px;
        color: #d7e2ff;
      }

      .overlay .hint {
        font-size: 0.95rem;
        color: #a9bff5;
      }
    </style>
  </head>
  <body>
    <div class="game-shell">
      <div class="hud">
        <div class="title">Geometry Dash Clone</div>
        <div class="mode-buttons">
          <button id="cubeMode" class="active">Cube</button>
          <button id="shipMode">Ship</button>
        </div>
        <div class="score">
          <span id="scoreLabel">Score: 0</span>
          <span id="speedLabel">Speed: 6</span>
        </div>
        <button id="restartButton">Restart</button>
      </div>
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div id="overlay" class="overlay visible">
          <h2>Tap or press Space to jump</h2>
          <p>Survive as long as you can while the obstacle course scrolls from right to left. The speed increases over time.</p>
          <div class="hint">Click "Restart" or press Space to begin.</div>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreLabel = document.getElementById('scoreLabel');
      const speedLabel = document.getElementById('speedLabel');
      const restartButton = document.getElementById('restartButton');
      const overlay = document.getElementById('overlay');
      const cubeModeBtn = document.getElementById('cubeMode');
      const shipModeBtn = document.getElementById('shipMode');

      const gameWidth = canvas.width;
      const gameHeight = canvas.height;
      const groundHeight = 100;
      const gravity = 0.8;
      const jumpForce = -16;

      let gameMode = 'cube';
      let running = false;
      let lastTime = 0;
      let score = 0;
      let speed = 6;
      let colorPulse = 0;
      let portalSpawnTimer = 0;

      const player = {
        x: 120,
        y: gameHeight - groundHeight - 60,
        width: 54,
        height: 54,
        vy: 0,
        onGround: true,
        rotation: 0,
        rotationVelocity: 0,
      };

      let obstacles = [];
      let spawnTimer = 0;

      function setGameMode(mode) {
        if (running) return;
        gameMode = mode;
        cubeModeBtn.classList.toggle('active', mode === 'cube');
        shipModeBtn.classList.toggle('active', mode === 'ship');
        resetGame();
      }

      function resetGame() {
        running = false;
        score = 0;
        speed = 6;
        player.y = gameHeight - groundHeight - 60;
        player.vy = 0;
        player.onGround = true;
        player.rotation = 0;
        player.rotationVelocity = 0;
        obstacles = [];
        spawnTimer = 0;
        portalSpawnTimer = 0;
        overlay.classList.add('visible');
        scoreLabel.textContent = 'Score: 0';
        speedLabel.textContent = 'Speed: 6';
        
        if (gameMode === 'cube') {
          overlay.innerHTML = `
            <h2>Tap or press Space to jump</h2>
            <p>Survive as long as you can while the obstacle course scrolls from right to left. The speed increases over time.</p>
            <div class="hint">Click "Restart" or press Space to begin.</div>
          `;
        } else {
          overlay.innerHTML = `
            <h2>Press UP/DOWN or Click to rotate</h2>
            <p>Rotate your ship to dodge the incoming obstacles. Navigate through the narrow gaps!</p>
            <div class="hint">Click "Restart" or press Arrow Keys to begin.</div>
          `;
        }
      }

      function startGame() {
        if (running) return;
        running = true;
        overlay.classList.remove('visible');
        lastTime = performance.now();
        requestAnimationFrame(loop);
      }

      function gameOver() {
        running = false;
        overlay.innerHTML = `
          <h2>Game Over</h2>
          <p>Your score: ${Math.floor(score)}</p>
          <div class="hint">Press Space or click Restart to try again.</div>
        `;
        overlay.classList.add('visible');
      }

      function jump() {
        if (!player.onGround || !running) {
          if (!running) startGame();
          return;
        }
        player.vy = jumpForce;
        player.onGround = false;
      }

      function rotateShip(direction) {
        if (!running) {
          startGame();
          return;
        }
        player.rotationVelocity += direction * 0.3;
      }

      function createObstacle(isPortal = false) {
        if (isPortal) {
          const portalY = gameHeight * 0.3 + Math.random() * (gameHeight * 0.4);
          const targetMode = Math.random() < 0.5 ? 'cube' : 'ship';
          obstacles.push({
            x: gameWidth + 40,
            y: portalY,
            radius: 30,
            type: 'portal',
            targetMode: targetMode,
          });
        } else if (gameMode === 'cube') {
          const height = 40 + Math.random() * 40;
          const width = 50 + Math.random() * 20;
          const y = gameHeight - groundHeight - height;
          obstacles.push({ x: gameWidth + 40, y, width, height, type: 'spike' });
        } else if (gameMode === 'ship') {
          const radius = 25 + Math.random() * 15;
          const fireballY = 80 + Math.random() * (gameHeight - groundHeight - 160);
          obstacles.push({
            x: gameWidth + 40,
            y: fireballY,
            radius,
            type: 'fireball',
          });
        }
        spawnTimer = 0;
      }

      function update(delta) {
        if (!running) return;
        score += delta * 0.01;
        speed += delta * 0.00005;
        spawnTimer += delta;
        portalSpawnTimer += delta;

        const spawnInterval = Math.max(1100 - speed * 12, 720);
        if (spawnTimer > spawnInterval) {
          const portalChance = Math.random() < 0.15;
          createObstacle(portalChance);
        }

        const portalInterval = 3500 + Math.random() * 2000;
        if (portalSpawnTimer > portalInterval) {
          createObstacle(true);
          portalSpawnTimer = 0;
        }

        if (gameMode === 'cube') {
          player.vy += gravity;
          player.y += player.vy;

          if (player.y + player.height >= gameHeight - groundHeight) {
            player.y = gameHeight - groundHeight - player.height;
            player.vy = 0;
            player.onGround = true;
          }

          obstacles = obstacles.filter((obs) => obs.x + (obs.radius ? obs.radius * 2 : obs.width) > -20);

          for (const obs of obstacles) {
            obs.x -= speed;
            if (obs.type === 'portal') {
              const dist = Math.hypot((player.x + player.width * 0.5) - obs.x, (player.y + player.height * 0.5) - obs.y);
              if (dist < obs.radius + 30) {
                gameMode = obs.targetMode;
                player.rotation = 0;
                player.rotationVelocity = 0;
              }
            } else if (obs.type === 'spike') {
              if (
                player.x < obs.x + obs.width &&
                player.x + player.width > obs.x &&
                player.y < obs.y + obs.height &&
                player.y + player.height > obs.y
              ) {
                gameOver();
              }
            }
          }
        } else {
          player.rotationVelocity *= 0.92;
          player.rotation += player.rotationVelocity;
          player.rotation = Math.max(-1.2, Math.min(1.2, player.rotation));

          obstacles = obstacles.filter((obs) => obs.x + (obs.radius ? obs.radius * 2 : obs.width) > -20);

          const shipRadius = 25;
          const shipCenterX = player.x + player.width * 0.5;
          const shipCenterY = player.y + player.height * 0.5;

          for (const obs of obstacles) {
            obs.x -= speed;
            if (obs.type === 'portal') {
              const dist = Math.hypot(shipCenterX - obs.x, shipCenterY - obs.y);
              if (dist < obs.radius + shipRadius) {
                gameMode = obs.targetMode;
                player.onGround = false;
              }
            } else if (obs.type === 'fireball') {
              const dist = Math.hypot(shipCenterX - obs.x, shipCenterY - obs.y);
              if (dist < obs.radius + shipRadius) {
                gameOver();
              }
            }
          }
        }

        scoreLabel.textContent = 'Score: ' + Math.floor(score);
        speedLabel.textContent = 'Speed: ' + Math.floor(speed);
      }

      function drawBackground() {
        const skyGradient = ctx.createLinearGradient(0, 0, 0, gameHeight);
        skyGradient.addColorStop(0, '#07101f');
        skyGradient.addColorStop(1, '#09111f');
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, gameWidth, gameHeight);

        ctx.fillStyle = '#102040';
        for (let i = 0; i < 26; i++) {
          const x = ((i * 210 + colorPulse * 3) % (gameWidth + 100)) - 100;
          ctx.fillRect(x, gameHeight - groundHeight - 32, 120, 32);
        }

        ctx.fillStyle = '#16284a';
        ctx.fillRect(0, gameHeight - groundHeight, gameWidth, groundHeight);

        ctx.fillStyle = '#19305b';
        ctx.fillRect(0, gameHeight - groundHeight + 18, gameWidth, 16);
      }

      function draw() {
        drawBackground();

        if (gameMode === 'cube') {
          ctx.fillStyle = '#f9dc5c';
          ctx.fillRect(player.x, player.y, player.width, player.height);

          for (const obs of obstacles) {
            if (obs.type === 'spike') {
              ctx.fillStyle = '#ee6c4d';
              ctx.beginPath();
              ctx.moveTo(obs.x, obs.y + obs.height);
              ctx.lineTo(obs.x + obs.width * 0.5, obs.y);
              ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
              ctx.closePath();
              ctx.fill();
            } else if (obs.type === 'portal') {
              const isShipPortal = obs.targetMode === 'ship';
              ctx.fillStyle = isShipPortal ? '#0099ff' : '#00ff88';
              ctx.beginPath();
              ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = isShipPortal ? '#0099ff' : '#00ff88';
              ctx.lineWidth = 3;
              ctx.stroke();
              ctx.fillStyle = '#000';
              ctx.font = 'bold 20px Arial';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(isShipPortal ? '→' : '→', obs.x, obs.y);
            }
          }

          ctx.fillStyle = '#fff';
          ctx.font = '700 24px Inter, system-ui, sans-serif';
          ctx.fillText('SPACE / TAP to jump', 28, 42);
        } else {
          const shipCenterX = player.x + player.width * 0.5;
          const shipCenterY = player.y + player.height * 0.5;
          const shipRadius = 25;

          ctx.save();
          ctx.translate(shipCenterX, shipCenterY);
          ctx.rotate(player.rotation);

          ctx.fillStyle = '#00d4ff';
          ctx.beginPath();
          ctx.moveTo(shipRadius, 0);
          ctx.lineTo(-shipRadius * 0.6, -shipRadius * 0.6);
          ctx.lineTo(-shipRadius * 0.4, 0);
          ctx.lineTo(-shipRadius * 0.6, shipRadius * 0.6);
          ctx.closePath();
          ctx.fill();

          ctx.restore();

          for (const obs of obstacles) {
            if (obs.type === 'fireball') {
              ctx.fillStyle = '#ff6b35';
              ctx.beginPath();
              ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = '#ffaa33';
              ctx.beginPath();
              ctx.arc(obs.x - obs.radius * 0.3, obs.y - obs.radius * 0.3, obs.radius * 0.6, 0, Math.PI * 2);
              ctx.fill();
            } else if (obs.type === 'portal') {
              const isCubePortal = obs.targetMode === 'cube';
              ctx.fillStyle = isCubePortal ? '#00ff88' : '#0099ff';
              ctx.beginPath();
              ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = isCubePortal ? '#00ff88' : '#0099ff';
              ctx.lineWidth = 3;
              ctx.stroke();
              ctx.fillStyle = '#000';
              ctx.font = 'bold 20px Arial';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(isCubePortal ? '↓' : '↑', obs.x, obs.y);
            }
          }

          ctx.fillStyle = '#fff';
          ctx.font = '700 24px Inter, system-ui, sans-serif';
          ctx.fillText('UP/DOWN or CLICK to rotate', 28, 42);
        }
      }

      function loop(timestamp) {
        const delta = timestamp - lastTime;
        lastTime = timestamp;
        colorPulse += delta * 0.002;

        update(delta);
        draw();

        if (running) {
          requestAnimationFrame(loop);
        }
      }

      const keysPressed = {};
      window.addEventListener('keydown', (event) => {
        keysPressed[event.code] = true;
        if (event.code === 'Space' && gameMode === 'cube') {
          event.preventDefault();
          jump();
        }
        if (event.code === 'ArrowUp') {
          event.preventDefault();
          rotateShip(-1);
        }
        if (event.code === 'ArrowDown') {
          event.preventDefault();
          rotateShip(1);
        }
      });

      window.addEventListener('keyup', (event) => {
        keysPressed[event.code] = false;
      });

      window.addEventListener('pointerdown', () => {
        if (gameMode === 'cube') {
          jump();
        } else {
          rotateShip(-1);
        }
      });

      cubeModeBtn.addEventListener('click', () => setGameMode('cube'));
      shipModeBtn.addEventListener('click', () => setGameMode('ship'));

      restartButton.addEventListener('click', () => {
        resetGame();
        startGame();
      });

      resetGame();
    </script>
  </body>
</html>
